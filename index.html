<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>PTM — AI Agent Platform</title>
<script src="agents.js"></script>
<style>
:root { --bg:#060d10; --bg-card:#101b21; --border:#16242e; --text:#e4ecef; --muted:#7f939e; --teal:#00d2aa; --blue:#0096e0; }
body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,sans-serif; margin:0; padding:40px; }
h1 { text-align:center; font-size:36px; margin-bottom:40px; }
h1 span { color:var(--teal); }
.agent-card { background:var(--bg-card); border:1px solid var(--border); border-radius:8px; padding:24px; margin-bottom:20px; max-width:800px; margin-left:auto; margin-right:auto; }
.agent-card h3 { margin-bottom:8px; }
.agent-card p { color:var(--muted); font-size:14px; margin-bottom:16px; }
.inputs { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
.inputs input, .inputs textarea { background:#0c1519; border:1px solid var(--border); border-radius:6px; padding:10px; color:var(--text); font-size:14px; }
.inputs textarea { grid-column:1/-1; min-height:60px; }
button { background:linear-gradient(135deg,var(--teal),var(--blue)); color:white; border:none; padding:12px 24px; border-radius:8px; cursor:pointer; font-weight:600; }
button:disabled { opacity:0.5; }
.result { display:none; margin-top:16px; padding:16px; background:#0c1519; border-left:3px solid var(--teal); white-space:pre-wrap; font-size:14px; line-height:1.6; }
</style>
</head>
<body>

<h1>PTM<span>.</span>AI Agent Platform</h1>

<div class="agent-card">
  <h3>投资筛选分析</h3>
  <p>gemma4:31b — 评估储能项目投资价值</p>
  <div class="inputs">
    <input id="i-name" value="广东储能项目">
    <input id="i-region" value="广东">
    <input id="i-cap" type="number" value="100">
    <input id="i-inv" type="number" value="50000000">
    <input id="i-rev" type="number" value="8000000">
    <input id="i-life" type="number" value="15">
  </div>
  <button onclick="runAgent('investment',{
    project_name:document.getElementById('i-name').value,
    region:document.getElementById('i-region').value,
    capacity_mwh:parseFloat(document.getElementById('i-cap').value),
    initial_investment:parseFloat(document.getElementById('i-inv').value),
    annual_revenue:parseFloat(document.getElementById('i-rev').value),
    project_life:parseFloat(document.getElementById('i-life').value)
  },'result-investment')">运行投资分析</button>
  <div class="result" id="result-investment"></div>
</div>

<div class="agent-card">
  <h3>政策分析</h3>
  <p>qwen3.6:27b — 能源政策结构化简报</p>
  <div class="inputs">
    <input id="p-topic" value="2026年新型储能发展政策" style="grid-column:1/-1;">
  </div>
  <button onclick="runAgent('policy',{policy_topic:document.getElementById('p-topic').value},'result-policy')">运行政策分析</button>
  <div class="result" id="result-policy"></div>
</div>

<div class="agent-card">
  <h3>电力市场周报</h3>
  <p>gemma4:31b — 电力市场数据分析</p>
  <div class="inputs">
    <textarea id="m-data" placeholder="粘贴市场数据（或留空）"></textarea>
  </div>
  <button onclick="runAgent('market',{market_data:document.getElementById('m-data').value||'近期电力市场分析'},'result-market')">生成周报</button>
  <div class="result" id="result-market"></div>
</div>

<div class="agent-card">
  <h3>财务审计</h3>
  <p>qwen3-coder:30b — 财务报表审计意见</p>
  <div class="inputs">
    <textarea id="a-data">{"revenue":120000000,"cost":80000000,"profit":40000000}</textarea>
  </div>
  <button onclick="runAgent('audit',{financial_data:JSON.parse(document.getElementById('a-data').value)},'result-audit')">运行审计</button>
  <div class="result" id="result-audit"></div>
</div>

<script>
async function runAgent(type, data, resultId) {
  const btn = event.target, el = document.getElementById(resultId);
  btn.disabled = true; btn.textContent = '运行中...'; el.style.display = 'none';
  try {
    const task = await window.agentRunner.runAgent(type, data);
    window.agentRunner.pollTask(task.task_id,
      () => {},
      (res) => {
        btn.disabled = false;
        btn.textContent = btn.textContent.replace('运行中...','运行');
        if (res.error) { el.innerHTML = '<span style="color:#f04460">错误: '+res.error+'</span>'; }
        else { el.innerHTML = '<pre style="margin:0;white-space:pre-wrap;">'+(res.result?.result||res.result?.content||JSON.stringify(res,null,2))+'</pre>'; }
        el.style.display = 'block';
      }
    );
  } catch(e) { btn.disabled = false; btn.textContent = '运行'; el.innerHTML = '<span style="color:#f04460">错误: '+e.message+'</span>'; el.style.display = 'block'; }
}
</script>

</body>
</html>
